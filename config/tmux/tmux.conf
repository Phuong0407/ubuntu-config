# ~/.tmux.conf

set -g @plugin 'tmux-plugins/tmux-resurrect'

# prefix key
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# mouse support
set -g mouse on

# start index at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# history limit
set -g history-limit 50000

# escape time
set -sg escape-time 10

# focus events (Neovim autoread)
set -g focus-events on

# split panes -- keep current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes -- repeatable
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# copy mode
setw -g mode-keys vi

# enter copy mode
bind [ copy-mode
bind Escape copy-mode

# vi-style selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# paste
bind p paste-buffer

# status line
set -g status-position bottom
set -g status-style 'bg=default fg=white'
set -g status-left ''
set -g status-right '#[fg=green]#H #[fg=yellow]%H:%M:%S'
set -g status-right-length 50
set -g status-interval 1

# window status
setw -g window-status-current-style 'fg=black bg=green bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style 'fg=white bg=default'
setw -g window-status-format ' #I:#W#F '

# pane border
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=green'

# aggressive resize (only limit window size when smaller client is actively looking)
setw -g aggressive-resize on

# monitor activity
setw -g monitor-activity on
set -g visual-activity off

# load zshrc
set-option -g default-shell /usr/bin/zsh
