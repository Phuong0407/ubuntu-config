# Colors - Green on Black (Ubuntu classic terminal)
foreground            #00FF00
background            #000000
cursor                #00FF00

# Normal colors
color0  #000000
color1  #AA0000
color2  #00AA00
color3  #AA5500
color4  #0000AA
color5  #AA00AA
color6  #00AAAA
color7  #AAAAAA

# Bright colors
color8  #555555
color9  #FF5555
color10 #55FF55
color11 #FFFF55
color12 #5555FF
color13 #FF55FF
color14 #55FFFF
color15 #FFFFFF

font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

shell /usr/bin/zsh -l

map f11 toggle_fullscreen
